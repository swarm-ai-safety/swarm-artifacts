# Hypothesis: Circuit breaker threshold calibration
#
# Tests claim-cb-null-may-reflect-design-limitation and
# claim-optimal-cb-threshold-predicted-in-03-05-range.
#
# The CB null effect (d=0.008 in 700 runs) may be an artifact of
# binary on/off design with default thresholds. This sweep varies
# freeze_threshold_toxicity, freeze_threshold_violations,
# freeze_duration_epochs, and transaction_tax_rate to characterize
# the full CB parameter space and identify optimal configurations.
#
# Design: 4x4x3x3 full factorial = 144 configs × 10 seeds = 1,440 runs.
# Based on game-theoretic punishment calibration (MIT OCW 17.810),
# ROC tradeoff analysis (Zou et al. 2024), and ABM sweep best
# practices (Grimm et al., JASSS).
#
# Directional prediction: freeze_threshold_toxicity 0.3-0.5 maximizes
# welfare by balancing false positive rate against adversary detection.
#
# Falsification: If welfare is invariant across all 144 configurations
# (ANOVA p>0.05), CB is genuinely null regardless of calibration.

scenario_id: hypothesis_cb_threshold_sweep
description: "Full factorial CB parameter sweep to resolve calibration gap"
motif: "Circuit breaker threshold calibration"
hypothesis: claim-cb-null-may-reflect-design-limitation

agents:
  - type: honest
    count: 6
  - type: adversarial
    count: 2

governance:
  circuit_breaker_enabled: true
  freeze_threshold_toxicity: 0.6
  freeze_threshold_violations: 3
  freeze_duration_epochs: 3
  audit_enabled: true
  audit_probability: 0.10
  collusion_detection_enabled: false
  staking_enabled: false
  transaction_tax_rate: 0.0

network:
  topology: small_world
  params:
    k: 4
    p: 0.15
  dynamic: false

simulation:
  n_epochs: 30
  steps_per_epoch: 10

payoff:
  s_plus: 3.0
  s_minus: 1.5
  h: 3.0
  theta: 0.5
  w_rep: 2.5

sweep:
  type: factorial
  seeds: [42, 7, 123, 256, 999, 2024, 314, 577, 1337, 8080]
  parameters:
    governance.freeze_threshold_toxicity: [0.3, 0.5, 0.7, 0.9]
    governance.freeze_threshold_violations: [1, 3, 5, 8]
    governance.freeze_duration_epochs: [1, 3, 5]
    governance.transaction_tax_rate: [0.0, 0.05, 0.10]

analysis:
  primary_metrics:
    - welfare: "Total welfare across all agents"
    - toxicity_rate: "Average toxicity rate"
    - n_frozen: "Number of agents frozen by circuit breaker"
    - honest_payoff: "Mean honest agent payoff"
    - adversarial_payoff: "Mean adversarial agent payoff"
  comparison: three_way_anova_threshold_violations_duration
  correction: benjamini_hochberg
  expected_effect: "freeze_threshold_toxicity 0.3-0.5 maximizes welfare; threshold x tax interaction significant"
  falsification: "welfare invariant across all 144 configurations (ANOVA F<1, p>0.05)"

success_criteria:
  min_seeds: 10
  significance_level: 0.05
